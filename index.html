<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hero Car</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: #020202;
    }

    body {
      overflow-x: hidden;
      overflow-y: auto;
    }

    .scroll-stage {
      height: 220vh;
      position: relative;
    }

    #hero-car {
      width: 100%;
      height: 100vh;
      position: sticky;
      top: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 28%, rgba(255,255,255,0.04), transparent 28%),
        linear-gradient(to bottom, #050505 0%, #030303 45%, #010101 100%);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <section class="scroll-stage">
    <div id="hero-car"></div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/three@0.91.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.91.0/examples/js/loaders/GLTFLoader.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/three@0.91.0/examples/js/postprocessing/EffectComposer.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.91.0/examples/js/postprocessing/RenderPass.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.91.0/examples/js/postprocessing/ShaderPass.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.91.0/examples/js/shaders/CopyShader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.91.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.91.0/examples/js/postprocessing/UnrealBloomPass.js"></script>

  <script src="hero-car.js"></script>
</body>
</html>
